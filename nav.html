<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Dashboard</title>
</head>

<body class="bg-gray-100">

    <div class="flex min-h-screen">

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed md:static top-0 left-[-260px] md:left-0 z-50
      w-[240px] h-screen bg-slate-950 text-white
      flex flex-col justify-between
      transition-all duration-300">

            <div>

                <!-- Logo -->
                <div class="p-5 text-2xl font-bold border-b border-slate-800 flex justify-between items-center">
                    <span>📱 MobileShop</span>

                    <!-- Close Button -->
                    <button id="closeBtn" class="md:hidden text-3xl">
                        ✕
                    </button>
                </div>

                <!-- Menu -->
                <ul class="p-4 space-y-3">

                    <li class="bg-gradient-to-r from-pink-500 to-purple-600 p-3 rounded-lg cursor-pointer">
                        Dashboard
                    </li>

                    <li class="hover:bg-slate-800 p-3 rounded-lg cursor-pointer">
                        Products
                    </li>

                    <li class="hover:bg-slate-800 p-3 rounded-lg cursor-pointer">
                        Orders
                    </li>

                    <li class="hover:bg-slate-800 p-3 rounded-lg cursor-pointer">
                        Users
                    </li>

                </ul>
            </div>

            <!-- Logout -->
            <div class="p-4">
                <button class="w-full bg-slate-800 hover:bg-slate-700 p-3 rounded-lg">
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main -->
        <main class="flex-1 p-5 w-full">

            <!-- Topbar -->
            <div class="flex items-center gap-4 mb-6">

                <!-- Mobile Menu Button -->
                <button id="menuBtn" class="md:hidden text-3xl">
                    ☰
                </button>

                <h1 class="text-3xl font-bold">
                    Dashboard
                </h1>
            </div>

            <!-- Cards -->
            <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-5">

                <!-- Total Sales -->
                <div class="bg-white rounded-2xl p-5 shadow-sm flex items-center gap-4">

                    <div class="w-14 h-14 rounded-xl bg-green-100
      flex items-center justify-center text-2xl">
                        💰
                    </div>

                    <div>
                        <p class="text-gray-500">Total Sales</p>
                        <h2 class="text-3xl font-bold">$0.00</h2>
                    </div>

                </div>

                <!-- Orders -->
                <div class="bg-white rounded-2xl p-5 shadow-sm flex items-center gap-4">

                    <div class="w-14 h-14 rounded-xl bg-blue-100
      flex items-center justify-center text-2xl">
                        🛒
                    </div>

                    <div>
                        <p class="text-gray-500">Total Orders</p>
                        <h2 class="text-3xl font-bold">0</h2>
                    </div>

                </div>

                <!-- Customers -->
                <div class="bg-white rounded-2xl p-5 shadow-sm flex items-center gap-4">

                    <div class="w-14 h-14 rounded-xl bg-purple-100
      flex items-center justify-center text-2xl">
                        👥
                    </div>

                    <div>
                        <p class="text-gray-500">Customers</p>
                        <h2 class="text-3xl font-bold">1</h2>
                    </div>

                </div>

                <!-- Low Stock -->
                <div class="bg-white rounded-2xl p-5 shadow-sm flex items-center gap-4">
                    <div class="w-14 h-14 rounded-xl bg-red-100
      flex items-center justify-center text-2xl">
                        ⚠️
                    </div>

                    <div>
                        <p class="text-gray-500">Low Stock Items</p>
                        <h2 class="text-3xl font-bold">0</h2>
                    </div>

                </div>

            </div>


            <!-- Table -->
            <div class="bg-white rounded-xl shadow mt-8 overflow-x-auto">
          <div class="p-4 border-b flex justify-between items-center">
            <h2 class="font-bold text-lg">Recent Orders</h2>

            <a href="#" class="text-pink-500 text-sm"> View All </a>
          </div>

          <table class="w-full min-w-[600px]">
            <thead class="bg-gray-100">
              <tr class="text-left text-gray-600">
                <th class="p-4">Order ID</th>
                <th class="p-4">Customer</th>
                <th class="p-4">Date</th>
                <th class="p-4">Total</th>
                <th class="p-4">Status</th>
              </tr>
            </thead>

            <tbody>
              <tr class="border-t">
                <td class="p-4">#1001</td>
                <td class="p-4">Mg Mg</td>
                <td class="p-4">20 May</td>
                <td class="p-4">$100</td>
                <td class="p-4 text-green-500 font-semibold">Completed</td>
              </tr>

              <tr class="border-t">
                <td class="p-4">#1002</td>
                <td class="p-4">Su Su</td>
                <td class="p-4">21 May</td>
                <td class="p-4">$80</td>
                <td class="p-4 text-yellow-500 font-semibold">Pending</td>
              </tr>
            </tbody>
          </table>
        </div>

    </div>

    </main>

    </div>

    <script>
        const menuBtn = document.getElementById("menuBtn");
        const closeBtn = document.getElementById("closeBtn");
        const sidebar = document.getElementById("sidebar");

        // Open Sidebar
        menuBtn.addEventListener("click", () => {
            sidebar.classList.remove("left-[-260px]");
            sidebar.classList.add("left-0");

            menuBtn.innerHTML = "✕";
        });

        // Close Sidebar
        closeBtn.addEventListener("click", () => {
            sidebar.classList.remove("left-0");
            sidebar.classList.add("left-[-260px]");

            menuBtn.innerHTML = "☰";
        });
    </script>

</body>

</html>
